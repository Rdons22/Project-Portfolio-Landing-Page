name: Build Static Portfolio

on:
  push:
    branches: ["main"]
    paths:
      - "Project-Portfolio-Landing-Page-main/**"
      - ".github/workflows/build-static-root.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Project-Portfolio-Landing-Page-main/package-lock.json

      - name: Install dependencies
        working-directory: Project-Portfolio-Landing-Page-main
        run: npm ci

      - name: Build app
        working-directory: Project-Portfolio-Landing-Page-main
        run: npm run build

      - name: Copy built site to repo root
        run: |
          rm -rf assets
          cp -R Project-Portfolio-Landing-Page-main/dist/* .
          touch .nojekyll

      - name: Commit built site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets .nojekyll
          git commit -m "Build static portfolio site [skip ci]" || exit 0
          git push
